<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qhatu | Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pastelYellow: '#FDFD96',
                        turquesa: '#40E0D0',
                        navyBlue: '#000080',
                    }
                }
            }
        }
    </script>
    <style>
        .hidden { display: none; }
        .active-view { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 min-h-screen flex flex-col">

    <nav class="bg-navyBlue text-white p-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-2xl font-bold cursor-pointer" onclick="showView('home')">Qhatu</h1>
        <div id="auth-buttons">
            <button onclick="loginGoogle()" class="bg-turquesa hover:bg-cyan-400 text-navyBlue px-4 py-2 rounded-lg font-semibold transition">Login con Google</button>
        </div>
        <div id="user-info" class="hidden flex items-center gap-4">
            <span id="user-name" class="text-sm font-bold"></span>
            <button onclick="logout()" class="text-xs underline text-pastelYellow">Cerrar Sesión</button>
        </div>
    </nav>

    <section id="view-home" class="active-view flex-grow flex flex-col items-center justify-center p-6 text-center">
        <h2 class="text-4xl font-extrabold mb-4 text-navyBlue">Marketplace Escolar</h2>
        <p class="mb-10 text-lg text-gray-600">Apoya el talento de tus compañeros de Eight Academy.</p>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl">
            <div onclick="setRole('emprendedor')" class="bg-pastelYellow p-10 rounded-3xl shadow-xl cursor-pointer hover:scale-105 transition transform border-4 border-transparent hover:border-navyBlue">
                <div class="text-6xl mb-4">🚀</div>
                <h3 class="text-2xl font-bold text-navyBlue">Vender</h3>
            </div>
            <div onclick="setRole('comprador')" class="bg-turquesa p-10 rounded-3xl shadow-xl cursor-pointer hover:scale-105 transition transform border-4 border-transparent hover:border-navyBlue text-white">
                <div class="text-6xl mb-4">🛍️</div>
                <h3 class="text-2xl font-bold">Comprar</h3>
            </div>
        </div>
    </section>

    <section id="view-comprador" class="hidden p-6 max-w-7xl mx-auto flex-grow w-full">
		<button onclick="showView('home')" class="mb-6 text-navyBlue font-bold flex items-center gap-2 hover:underline">
			← Volver al Inicio
		</button>
        <div class="flex flex-col md:flex-row gap-4 mb-8">
            <input type="text" id="search-input" oninput="filterProducts()" placeholder="Buscar emprendimiento..." class="flex-1 p-3 rounded-lg border-2 border-gray-200 focus:border-turquesa outline-none">
            <select id="category-filter" onchange="filterProducts()" class="p-3 rounded-lg border-2 border-gray-200">
                <option value="todos">Todas las categorías</option>
                <option value="comida">Comida</option>
                <option value="artesanias">Artesanías</option>
                <option value="servicios">Servicios</option>
            </select>
        </div>
        <div id="catalog-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </section>

    <section id="view-emprendedor" class="hidden p-6 max-w-7xl mx-auto flex-grow w-full">
		<button onclick="showView('home')" class="mb-6 text-navyBlue font-bold flex items-center gap-2 hover:underline">
			← Volver al Inicio
		</button>
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-bold text-navyBlue">Mi Panel</h2>
            <button onclick="openModal('modal-add')" class="bg-navyBlue text-white px-6 py-3 rounded-xl font-bold">+ Publicar Producto</button>
        </div>
        <div id="my-products-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </section>

    <div id="modal-add" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-2xl p-8 w-full max-w-lg relative">
            <button onclick="closeModal('modal-add')" class="absolute top-4 right-4 text-2xl text-gray-400 hover:text-navyBlue">&times;</button>
            <h3 class="text-2xl font-bold mb-6">Nuevo Producto</h3>
            <form id="form-product" class="space-y-4">
                <input type="text" id="p-name" placeholder="Nombre del producto" class="w-full p-2 border rounded" required>
                <textarea id="p-desc" placeholder="Descripción breve" class="w-full p-2 border rounded" required></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="p-grade" placeholder="Curso (Ej: 3ro B)" class="w-full p-2 border rounded" required>
                    <select id="p-cat" class="w-full p-2 border rounded">
                        <option value="comida">Comida</option>
                        <option value="artesanias">Artesanías</option>
                        <option value="servicios">Servicios</option>
                    </select>
                </div>
                <input type="number" id="p-price" step="0.01" placeholder="Precio ($)" class="w-full p-2 border rounded" required>
                <input type="text" id="p-contact" placeholder="WhatsApp (Ej: 59399...)" class="w-full p-2 border rounded" required>
                <input type="url" id="p-img" placeholder="Link de imagen (URL)" class="w-full p-2 border rounded" required>
                <button type="submit" class="w-full bg-turquesa text-white py-3 rounded-xl font-bold hover:bg-cyan-500 transition text-navyBlue">Guardar y Publicar</button>
            </form>
        </div>
    </div>

	<div id="modal-edit" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-[100]">
		<div class="bg-white rounded-2xl p-8 max-w-lg w-full shadow-2xl relative">
            <button onclick="closeModal('modal-edit')" class="absolute top-4 right-4 text-2xl text-gray-400 hover:text-navyBlue">&times;</button>
			<h3 class="text-2xl font-bold text-navyBlue mb-6">Editar Producto</h3>
			<form id="form-edit" class="space-y-4">
				<input type="hidden" id="edit-id">
				<input type="text" id="edit-name" placeholder="Nombre" class="w-full p-3 border rounded-xl" required>
				<textarea id="edit-desc" placeholder="Descripción" class="w-full p-3 border rounded-xl" required></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="edit-grade" placeholder="Curso" class="w-full p-3 border rounded-xl" required>
                    <select id="edit-cat" class="w-full p-3 border rounded-xl">
                        <option value="comida">Comida</option>
                        <option value="artesanias">Artesanías</option>
                        <option value="servicios">Servicios</option>
                    </select>
                </div>
				<input type="number" id="edit-price" step="0.01" placeholder="Precio" class="w-full p-3 border rounded-xl" required>
                <input type="text" id="edit-contact" placeholder="WhatsApp" class="w-full p-3 border rounded-xl" required>
                <input type="url" id="edit-img" placeholder="URL Imagen" class="w-full p-3 border rounded-xl" required>
				<div class="flex gap-3 mt-6">
					<button type="button" onclick="closeModal('modal-edit')" class="flex-1 py-3 border border-gray-300 rounded-xl font-bold hover:bg-gray-50 transition">Cancelar</button>
					<button type="submit" class="flex-1 py-3 bg-navyBlue text-white rounded-xl font-bold hover:opacity-90 transition">Guardar Cambios</button>
				</div>
			</form>
		</div>
	</div>

    <script type="module">
        // UNIFICADO: Todas las funciones de Firestore se importan aquí para evitar errores de duplicidad
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

		const firebaseConfig = {
		  apiKey: "AIzaSyDsERd3F0oOGOyrShHIrixFaipSojKJc8g",
		  authDomain: "marketplace-da7a4.firebaseapp.com",
		  databaseURL: "https://marketplace-da7a4-default-rtdb.firebaseio.com",
		  projectId: "marketplace-da7a4",
		  storageBucket: "marketplace-da7a4.firebasestorage.app",
		  messagingSenderId: "978612277776",
		  appId: "1:978612277776:web:6dabc86e700efc4d067095",
		  measurementId: "G-4ZPERXZCVZ"
		};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let allProducts = [];

        // --- SISTEMA DE VISTAS Y ROLES ---
        window.showView = (name) => {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`view-${name}`).classList.remove('hidden');
            if(name === 'comprador') loadCatalog();
            if(name === 'emprendedor') loadMyProducts();
        };

        window.setRole = (role) => {
            if(role === 'emprendedor' && !currentUser) loginGoogle();
            else showView(role);
        };

        window.loginGoogle = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                currentUser = result.user;
                showView('emprendedor');
            } catch (e) { console.error("Error Login:", e); }
        };

        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-buttons').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName;
            }
        });

        // --- GESTIÓN DE PRODUCTOS: CREACIÓN ---
        const form = document.getElementById('form-product');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await addDoc(collection(db, "products"), {
                    name: document.getElementById('p-name').value,
                    desc: document.getElementById('p-desc').value,
                    grade: document.getElementById('p-grade').value,
                    cat: document.getElementById('p-cat').value,
                    price: parseFloat(document.getElementById('p-price').value), // Permite decimales
                    contact: document.getElementById('p-contact').value,
                    img: document.getElementById('p-img').value,
                    userId: currentUser.uid
                });
                form.reset();
                closeModal('modal-add');
                loadMyProducts();
            } catch (error) { console.error("Error al guardar:", error); }
        });

        // --- GESTIÓN DE PRODUCTOS: LECTURA (COMPRADOR) ---
        window.loadCatalog = async () => {
            const snap = await getDocs(collection(db, "products"));
            allProducts = [];
            snap.forEach(d => allProducts.push({id: d.id, ...d.data()}));
            render(allProducts);
        };

        const render = (data) => {
            const container = document.getElementById('catalog-container');
            container.innerHTML = "";
            data.forEach(p => {
                container.innerHTML += `
                    <div class="bg-white rounded-xl shadow-lg p-4 hover:shadow-2xl transition flex flex-col h-full">
                        <img src="${p.img}" class="w-full h-40 object-cover rounded-lg mb-3" onerror="this.src='https://via.placeholder.com/150'">
                        <h4 class="font-bold text-navyBlue text-lg truncate">${p.name}</h4>
                        <p class="text-xs text-turquesa font-bold uppercase mb-2">${p.cat} - ${p.grade}</p>
                        <p class="text-sm text-gray-600 mb-4 h-10 overflow-hidden line-clamp-2">${p.desc}</p>
                        <div class="flex justify-between items-center border-t pt-3 mt-auto">
                            <span class="font-bold text-xl text-navyBlue">$${Number(p.price).toFixed(2)}</span>
                            <a href="https://wa.me/${p.contact}" target="_blank" class="bg-navyBlue text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-turquesa transition">Pedir</a>
                        </div>
                    </div>`;
            });
        };

        // --- GESTIÓN DE PRODUCTOS: MI PANEL (EMPRENDEDOR) ---
        window.loadMyProducts = async () => {
			if(!currentUser) return;
			const q = query(collection(db, "products"), where("userId", "==", currentUser.uid));
			const snap = await getDocs(q);
			const container = document.getElementById('my-products-container');
			container.innerHTML = "";
			
			snap.forEach(d => {
				const p = d.data();
				const displayLink = p.img.length > 15 ? p.img.substring(0, 15) + "..." : p.img;

				container.innerHTML += `
					<div class="bg-white rounded-xl shadow-lg p-4 hover:shadow-2xl transition flex flex-col h-full">
						<img src="${p.img}" class="w-full h-40 object-cover rounded-lg mb-3" onerror="this.src='https://via.placeholder.com/150'">
						<h4 class="font-bold text-navyBlue text-lg truncate">${p.name}</h4>
						<p class="text-xs text-turquesa font-bold uppercase mb-2">${p.cat} - ${p.grade}</p>
						<p class="text-sm text-gray-600 mb-4 h-10 overflow-hidden line-clamp-2">${p.desc}</p>
                        <div class="bg-gray-50 p-2 rounded-lg mb-4 text-xs">
                            <p class="text-[10px] text-gray-400 font-bold uppercase">URL Imagen</p>
                            <a href="${p.img}" target="_blank" class="text-blue-500 truncate block">${displayLink}</a>
                        </div>
						<div class="flex justify-between items-center border-t pt-3 mt-auto">
							<span class="font-bold text-xl text-navyBlue">$${Number(p.price).toFixed(2)}</span>
							<div class="flex gap-3">
								<button onclick="openEdit('${d.id}')" class="text-blue-500 font-bold text-xs">✏️ Editar</button>
								<button onclick="deleteP('${d.id}')" class="text-red-500 font-bold text-xs">🗑️ Eliminar</button>
							</div>
						</div>
					</div>`;
			});
		};

        // --- GESTIÓN DE PRODUCTOS: ELIMINAR ---
        window.deleteP = async (id) => {
            if(confirm("¿Estás seguro de eliminar este producto?")) { 
                await deleteDoc(doc(db, "products", id)); 
                loadMyProducts(); 
            }
        };

        // --- GESTIÓN DE PRODUCTOS: EDICIÓN ---
		window.openEdit = async (id) => {
			const docRef = doc(db, "products", id);
			const docSnap = await getDoc(docRef);
			if (docSnap.exists()) {
				const p = docSnap.data();
				document.getElementById('edit-id').value = id;
				document.getElementById('edit-name').value = p.name;
				document.getElementById('edit-desc').value = p.desc;
				document.getElementById('edit-grade').value = p.grade || "";
				document.getElementById('edit-cat').value = p.cat || "comida";
				document.getElementById('edit-price').value = p.price;
				document.getElementById('edit-contact').value = p.contact || "";
				document.getElementById('edit-img').value = p.img || "";
				openModal('modal-edit');
			}
		};

		document.getElementById('form-edit').addEventListener('submit', async (e) => {
			e.preventDefault();
			const id = document.getElementById('edit-id').value;
			const docRef = doc(db, "products", id);
			try {
				await updateDoc(docRef, {
					name: document.getElementById('edit-name').value,
					desc: document.getElementById('edit-desc').value,
					grade: document.getElementById('edit-grade').value,
					cat: document.getElementById('edit-cat').value,
					price: parseFloat(document.getElementById('edit-price').value),
					contact: document.getElementById('edit-contact').value,
					img: document.getElementById('edit-img').value
				});
				alert("¡Producto actualizado!");
				closeModal('modal-edit');
				loadMyProducts();
			} catch (error) { console.error("Error al editar:", error); }
		});

        // --- FUNCIONES DE INTERFAZ (MODALES / FILTROS) ---
        window.openModal = (id) => {
            const m = document.getElementById(id);
            m.classList.remove('hidden');
            if(id === 'modal-edit') m.classList.add('flex');
        };
        window.closeModal = (id) => {
            const m = document.getElementById(id);
            m.classList.add('hidden');
            if(id === 'modal-edit') m.classList.remove('flex');
        };
        window.filterProducts = () => {
            const t = document.getElementById('search-input').value.toLowerCase();
            const c = document.getElementById('category-filter').value;
            render(allProducts.filter(p => (p.name.toLowerCase().includes(t)) && (c === 'todos' || p.cat === c)));
        };
    </script>

    <footer class="bg-navyBlue text-white p-4 mt-auto">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center text-xs opacity-80">
            <p>© 2026 Qhatu Marketplace</p>
            <p class="font-medium tracking-wide">
                Realizado por <span class="text-turquesa font-bold">Lenin Barrera</span> | 3ro B | Eight Academy
            </p>
        </div>
    </footer>
</body>
</html>
